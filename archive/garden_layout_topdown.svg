<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 800" font-family="Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="1300" height="800" fill="#f7f5ef"/>

  <!-- Title -->
  <text x="650" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#2b3a2b">FarmSmart — Garden Top-Down Layout (Horizontal)</text>
  <text x="650" y="55" text-anchor="middle" font-size="12" fill="#555">House wall (NW) on top · Lawn (SE) on bottom · Two raised beds 8 ft × 4 ft × 1 ft deep · 1 ft gap · Scale: 1 grid square = 1 ft (50 px)</text>

  <!-- Patterns -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#d8d4c7" stroke-width="0.5"/>
    </pattern>
    <pattern id="bedgrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#6b4e2e" stroke-width="0.5" stroke-dasharray="2 2"/>
    </pattern>
    <pattern id="fabric" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#3a3a3a"/>
      <path d="M 0 0 L 8 8 M 8 0 L 0 8" stroke="#2a2a2a" stroke-width="0.5"/>
    </pattern>
    <pattern id="grass" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#7bae5a"/>
      <path d="M 2 8 L 2 4 M 5 9 L 5 3 M 8 8 L 8 5" stroke="#5a8e3e" stroke-width="0.8"/>
    </pattern>
    <pattern id="soil" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#8b6b47"/>
      <circle cx="3" cy="4" r="0.8" fill="#6b4e2e"/>
      <circle cx="10" cy="8" r="0.8" fill="#6b4e2e"/>
      <circle cx="6" cy="11" r="0.8" fill="#6b4e2e"/>
    </pattern>
    <pattern id="concrete" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#b8b2a3"/>
      <circle cx="4" cy="4" r="0.6" fill="#98927e"/>
      <circle cx="10" cy="9" r="0.6" fill="#98927e"/>
    </pattern>
    <pattern id="siding" width="12" height="12" patternUnits="userSpaceOnUse">
      <rect width="12" height="12" fill="#e8d9c0"/>
      <line x1="0" y1="6" x2="12" y2="6" stroke="#b8a480" stroke-width="0.6"/>
    </pattern>
    <pattern id="wallstone" width="16" height="10" patternUnits="userSpaceOnUse">
      <rect width="16" height="10" fill="#9a8e7a"/>
      <line x1="0" y1="5" x2="16" y2="5" stroke="#6a5e4a" stroke-width="0.6"/>
      <line x1="8" y1="0" x2="8" y2="5" stroke="#6a5e4a" stroke-width="0.6"/>
      <line x1="0" y1="5" x2="0" y2="10" stroke="#6a5e4a" stroke-width="0.6"/>
    </pattern>

    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#2b3a2b"/>
    </marker>
  </defs>

  <!-- Plot frame with grid -->
  <rect x="60" y="80" width="1180" height="650" fill="url(#grid)" stroke="#c9c4b3" stroke-width="1"/>

  <!-- ============ HOUSE WALL (TOP = NW) ============ -->
  <rect x="60" y="80" width="1180" height="70" fill="url(#siding)" stroke="#8a7a60" stroke-width="1.5"/>
  <text x="650" y="122" text-anchor="middle" font-size="18" font-weight="700" fill="#5a4a30">HOUSE WALL (NW)</text>

  <!-- ============ RETAINING WALL (LEFT = SW) ============ -->
  <rect x="60" y="150" width="80" height="490" fill="url(#wallstone)"/>
  <text x="100" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#fff" transform="rotate(-90 100 395)">Retaining Wall / Back Border (SW end)</text>
  <circle cx="100" cy="185" r="16" fill="#3e6b2e" opacity="0.85"/>
  <circle cx="100" cy="240" r="13" fill="#3e6b2e" opacity="0.85"/>
  <circle cx="100" cy="590" r="18" fill="#3e6b2e" opacity="0.85"/>

  <!-- ============ PATIO (RIGHT = NE) ============ -->
  <rect x="1160" y="150" width="80" height="490" fill="url(#concrete)"/>
  <text x="1200" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#3a3a3a" transform="rotate(-90 1200 395)">Patio / Entry (NE end)</text>

  <!-- ============ LANDSCAPE FABRIC AREA ============ -->
  <rect x="140" y="150" width="1020" height="490" fill="url(#fabric)" opacity="0.9"/>
  <text x="650" y="172" text-anchor="middle" font-size="10" fill="#f0f0f0" font-style="italic">landscape fabric (walkway / weed barrier)</text>

  <!-- ============ WIRE MESH FENCE (between fabric and grass) ============ -->
  <line x1="140" y1="640" x2="1160" y2="640" stroke="#4a4a4a" stroke-width="2.5" stroke-dasharray="5 3"/>
  <text x="160" y="635" font-size="10" fill="#3a3a3a" font-style="italic">wire mesh fence</text>

  <!-- ============ GRASS LAWN (BOTTOM = SE) ============ -->
  <rect x="60" y="640" width="1180" height="90" fill="url(#grass)" opacity="0.9"/>
  <text x="650" y="695" text-anchor="middle" font-size="18" font-weight="700" fill="#1f3d14">Grass / Lawn (SE)</text>

  <!-- ============ BED 1 (left, 8ft x 4ft) — SW-side bed ============ -->
  <g id="bed1">
    <rect x="225" y="295" width="400" height="200" fill="url(#soil)" stroke="#3a3a3a" stroke-width="4"/>
    <rect x="229" y="299" width="392" height="192" fill="none" stroke="#7a7a7a" stroke-width="1.2"/>
    <rect x="225" y="295" width="400" height="200" fill="url(#bedgrid)" opacity="0.6"/>
    <text x="425" y="380" text-anchor="middle" font-size="22" font-weight="700" fill="#2b1b0a">BED 1</text>
    <text x="425" y="405" text-anchor="middle" font-size="13" fill="#2b1b0a">(SW bed)</text>
    <text x="425" y="427" text-anchor="middle" font-size="12" fill="#3b2b1a">8 ft × 4 ft × 1 ft deep</text>
    <!-- Corner + mid stakes -->
    <circle cx="225" cy="295" r="4" fill="#111"/>
    <circle cx="625" cy="295" r="4" fill="#111"/>
    <circle cx="225" cy="495" r="4" fill="#111"/>
    <circle cx="625" cy="495" r="4" fill="#111"/>
    <circle cx="425" cy="295" r="3" fill="#111"/>
    <circle cx="425" cy="495" r="3" fill="#111"/>
  </g>

  <!-- Dim: length 8ft -->
  <line x1="225" y1="515" x2="625" y2="515" stroke="#2b3a2b" stroke-width="1"/>
  <line x1="225" y1="510" x2="225" y2="520" stroke="#2b3a2b" stroke-width="1"/>
  <line x1="625" y1="510" x2="625" y2="520" stroke="#2b3a2b" stroke-width="1"/>
  <text x="425" y="530" text-anchor="middle" font-size="11" fill="#2b3a2b">8 ft</text>

  <!-- Dim: width 4ft -->
  <line x1="205" y1="295" x2="205" y2="495" stroke="#2b3a2b" stroke-width="1"/>
  <line x1="200" y1="295" x2="210" y2="295" stroke="#2b3a2b" stroke-width="1"/>
  <line x1="200" y1="495" x2="210" y2="495" stroke="#2b3a2b" stroke-width="1"/>
  <text x="193" y="398" text-anchor="middle" font-size="11" fill="#2b3a2b" transform="rotate(-90 193 398)">4 ft</text>

  <!-- ============ 1-FT GAP / METAL DIVIDER ============ -->
  <rect x="625" y="295" width="50" height="200" fill="#8a8a8a" stroke="#5a5a5a" stroke-width="1.5"/>
  <text x="650" y="400" text-anchor="middle" font-size="10" font-style="italic" fill="#f0f0f0" transform="rotate(-90 650 400)">1 ft divider</text>

  <!-- Dim: gap 1ft -->
  <line x1="625" y1="515" x2="675" y2="515" stroke="#2b3a2b" stroke-width="1"/>
  <line x1="625" y1="510" x2="625" y2="520" stroke="#2b3a2b" stroke-width="1"/>
  <line x1="675" y1="510" x2="675" y2="520" stroke="#2b3a2b" stroke-width="1"/>
  <text x="650" y="530" text-anchor="middle" font-size="11" fill="#2b3a2b">1 ft</text>

  <!-- ============ BED 2 (right, 8ft x 4ft) — NE-side bed ============ -->
  <g id="bed2">
    <rect x="675" y="295" width="400" height="200" fill="url(#soil)" stroke="#3a3a3a" stroke-width="4"/>
    <rect x="679" y="299" width="392" height="192" fill="none" stroke="#7a7a7a" stroke-width="1.2"/>
    <rect x="675" y="295" width="400" height="200" fill="url(#bedgrid)" opacity="0.6"/>
    <text x="875" y="380" text-anchor="middle" font-size="22" font-weight="700" fill="#2b1b0a">BED 2</text>
    <text x="875" y="405" text-anchor="middle" font-size="13" fill="#2b1b0a">(NE bed)</text>
    <text x="875" y="427" text-anchor="middle" font-size="12" fill="#3b2b1a">8 ft × 4 ft × 1 ft deep</text>
    <circle cx="675" cy="295" r="4" fill="#111"/>
    <circle cx="1075" cy="295" r="4" fill="#111"/>
    <circle cx="675" cy="495" r="4" fill="#111"/>
    <circle cx="1075" cy="495" r="4" fill="#111"/>
    <circle cx="875" cy="295" r="3" fill="#111"/>
    <circle cx="875" cy="495" r="3" fill="#111"/>
  </g>

  <line x1="675" y1="515" x2="1075" y2="515" stroke="#2b3a2b" stroke-width="1"/>
  <line x1="675" y1="510" x2="675" y2="520" stroke="#2b3a2b" stroke-width="1"/>
  <line x1="1075" y1="510" x2="1075" y2="520" stroke="#2b3a2b" stroke-width="1"/>
  <text x="875" y="530" text-anchor="middle" font-size="11" fill="#2b3a2b">8 ft</text>

  <!-- ============ POTS (approximate from photo) ============ -->
  <!-- Along house wall side (top fabric strip, y ≈ 200-260) -->
  <circle cx="240" cy="210" r="11" fill="#1a1a1a" stroke="#000" stroke-width="1"/>
  <circle cx="320" cy="215" r="10" fill="#e8e3d0" stroke="#8a7a60" stroke-width="1"/>
  <circle cx="720" cy="210" r="11" fill="#1a1a1a" stroke="#000" stroke-width="1"/>
  <circle cx="820" cy="215" r="12" fill="#4a4a4a" stroke="#000" stroke-width="1"/>
  <circle cx="1020" cy="210" r="10" fill="#1a1a1a" stroke="#000" stroke-width="1"/>

  <!-- Along fence side (bottom fabric strip, y ≈ 560-615) -->
  <circle cx="280" cy="570" r="11" fill="#1a1a1a" stroke="#000" stroke-width="1"/>
  <circle cx="370" cy="575" r="10" fill="#e8e3d0" stroke="#8a7a60" stroke-width="1"/>
  <circle cx="480" cy="570" r="10" fill="#4a4a4a" stroke="#000" stroke-width="1"/>
  <circle cx="770" cy="570" r="11" fill="#1a1a1a" stroke="#000" stroke-width="1"/>
  <circle cx="880" cy="575" r="10" fill="#1a1a1a" stroke="#000" stroke-width="1"/>
  <circle cx="990" cy="570" r="11" fill="#4a4a4a" stroke="#000" stroke-width="1"/>

  <!-- ============ COMPASS ROSE (8-point, user-specified orientation) ============ -->
  <!-- Top=NW, Right=NE, Bottom=SE, Left=SW -->
  <g id="compass" transform="translate(1200,90)">
    <circle cx="0" cy="0" r="55" fill="#fff" stroke="#2b3a2b" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="#2b3a2b"/>

    <!-- Ordinal arrows (cardinal diagonals shown as the main 4 in this rotated map) -->
    <!-- NW: top (red, highlights "north-ish") -->
    <polygon points="0,-48 -8,0 8,0" fill="#c0392b"/>
    <text x="0" y="-56" text-anchor="middle" font-size="13" font-weight="700" fill="#2b3a2b">NW</text>
    <!-- NE: right -->
    <polygon points="48,0 0,-8 0,8" fill="#c0392b" fill-opacity="0.6"/>
    <text x="62" y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#2b3a2b">NE</text>
    <!-- SE: bottom -->
    <polygon points="0,48 -8,0 8,0" fill="#2b3a2b"/>
    <text x="0" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#2b3a2b">SE</text>
    <!-- SW: left -->
    <polygon points="-48,0 0,-8 0,8" fill="#2b3a2b"/>
    <text x="-62" y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#2b3a2b">SW</text>

    <!-- True cardinals on diagonals (smaller, italic) -->
    <text x="34" y="-30" text-anchor="middle" font-size="10" font-style="italic" fill="#888">N</text>
    <text x="34" y="40" text-anchor="middle" font-size="10" font-style="italic" fill="#888">E</text>
    <text x="-34" y="40" text-anchor="middle" font-size="10" font-style="italic" fill="#888">S</text>
    <text x="-34" y="-30" text-anchor="middle" font-size="10" font-style="italic" fill="#888">W</text>
  </g>
  <text x="1200" y="170" text-anchor="middle" font-size="10" fill="#666" font-style="italic">facing house: R=NE, L=SW</text>

  <!-- ============ SUN PATH ============ -->
  <g id="sunpath" transform="translate(100,90)">
    <circle cx="0" cy="0" r="22" fill="#ffd666" stroke="#e8a42a" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" font-weight="700" fill="#8a5a00">SUN</text>
    <!-- Sun arc: E (lower-right) → S (lower-left diag) → W (upper-left)
         In this map: E is roughly down-right, S is down-left, W is up-left.
         So sun sweeps across the LAWN (bottom) side mostly. -->
    <path d="M 40 28 Q 0 50 -40 10" stroke="#e8a42a" stroke-width="2" fill="none" stroke-dasharray="3 2" marker-end="url(#arrowhead)"/>
    <text x="0" y="75" text-anchor="middle" font-size="9" fill="#5a4a20">sun arcs across lawn (SE side)</text>
    <text x="0" y="88" text-anchor="middle" font-size="9" fill="#5a4a20">E↘ → S↙ → W↖</text>
  </g>

  <!-- ============ LEGEND ============ -->
  <g id="legend" transform="translate(80,755)">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#2b3a2b">Legend:</text>
    <rect x="60" y="-11" width="14" height="14" fill="url(#soil)"/>
    <text x="80" y="1" font-size="11" fill="#2b3a2b">Soil (bed)</text>
    <rect x="170" y="-11" width="14" height="14" fill="url(#fabric)"/>
    <text x="190" y="1" font-size="11" fill="#2b3a2b">Landscape fabric</text>
    <rect x="310" y="-11" width="14" height="14" fill="url(#grass)"/>
    <text x="330" y="1" font-size="11" fill="#2b3a2b">Lawn</text>
    <rect x="390" y="-11" width="14" height="14" fill="url(#concrete)"/>
    <text x="410" y="1" font-size="11" fill="#2b3a2b">Patio</text>
    <rect x="460" y="-11" width="14" height="14" fill="url(#siding)"/>
    <text x="480" y="1" font-size="11" fill="#2b3a2b">House siding</text>
    <rect x="570" y="-11" width="14" height="14" fill="url(#wallstone)"/>
    <text x="590" y="1" font-size="11" fill="#2b3a2b">Retaining wall</text>
    <circle cx="700" cy="-4" r="5" fill="#1a1a1a"/>
    <text x="710" y="1" font-size="11" fill="#2b3a2b">Pot</text>
    <circle cx="755" cy="-4" r="3.5" fill="#111"/>
    <text x="765" y="1" font-size="11" fill="#2b3a2b">Stake/post</text>
    <rect x="840" y="-11" width="14" height="14" fill="#8a8a8a"/>
    <text x="860" y="1" font-size="11" fill="#2b3a2b">Metal divider</text>
  </g>

  <text x="650" y="790" text-anchor="middle" font-size="10" fill="#888" font-style="italic">Plot: ~20 ft (SW↔NE) × ~12 ft (NW↔SE) between walls · Beds at true scale (8×4 ft)</text>
</svg>
